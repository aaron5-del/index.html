<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación 💌</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: linear-gradient(to right, #ff9a9e, #fad0c4);
        margin: 0;
        padding: 0;
    }

    .contenedor {
        margin-top: 100px;
    }

    h1 {
        font-size: 28px;
        color: #fff;
    }

    .botones {
        margin-top: 30px;
        position: relative;
    }

    button {
        padding: 12px 25px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
    }

    .si {
        background-color: #4CAF50;
        color: white;
    }

    .no {
        background-color: #f44336;
        color: white;
        position: absolute;
    }

    .mensaje {
        margin-top: 20px;
        font-size: 22px;
        color: white;
        display: none;
    }
</style>
</head>

<body>

<div class="contenedor">
    <h1>¿Quieres salir conmigo este fin de semana? 💕</h1>

    <div class="botones">
        <button class="si" onclick="aceptar()">Sí 💖</button>
        <button class="no" onmouseover="mover()">No 😢</button>
    </div>

    <div class="mensaje" id="mensaje">
        ¡Sabía que dirías que sí! 😍✨
    </div>
</div>

<script>
    function aceptar() {
        document.getElementById("mensaje").style.display = "block";
    }

    function mover() {
        let boton = document.querySelector(".no");
        let x = Math.random() * window.innerWidth - 100;
        let y = Math.random() * window.innerHeight - 50;

        boton.style.left = x + "px";
        boton.style.top = y + "px";
    }
</script>

</body>
</html>
